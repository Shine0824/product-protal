<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实验管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
    
    .container { display: flex; height: 100vh; }
    
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #2f4050 0%, #1a222c 100%);
      color: #a7b1c2;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .sidebar-header {
      padding: 20px 15px;
      background: #1ab394;
      color: white;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }
    
    .nav-menu {
      flex: 1;
      padding: 10px 0;
      overflow-y: auto;
    }
    
    .nav-group {
      margin-bottom: 5px;
    }
    
    .nav-group-header {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      font-weight: 500;
    }
    
    .nav-group-header:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }
    
    .nav-group-header.active {
      background: rgba(26, 179, 148, 0.1);
      color: #1ab394;
    }
    
    .nav-group-header .nav-icon {
      margin-right: 10px;
      font-size: 16px;
    }
    
    .nav-group-header .nav-label {
      flex: 1;
    }
    
    .nav-group-header .nav-arrow {
      font-size: 12px;
      transition: transform 0.3s;
    }
    
    .nav-group-header.active .nav-arrow {
      transform: rotate(90deg);
    }
    
    .nav-group-content {
      display: none;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .nav-group-content.expanded {
      display: block;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      padding: 10px 15px 10px 45px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
      border-left: 3px solid transparent;
    }

    .nav-item-top {
      padding: 14px 15px;
      padding-left: 22px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, rgba(26,179,148,0.22) 0%, rgba(26,179,148,0.05) 100%);
      border-left: 4px solid #1ab394;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 6px;
      position: relative;
    }
    .nav-item-top::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #1ab394 0%, #00695c 100%);
    }
    .nav-item-top .nav-icon {
      font-size: 18px;
      margin-right: 10px;
    }
    .nav-item-top:hover {
      background: linear-gradient(90deg, rgba(26,179,148,0.32) 0%, rgba(26,179,148,0.08) 100%);
    }
    .nav-item-top.active {
      background: linear-gradient(90deg, rgba(26,179,148,0.35) 0%, rgba(26,179,148,0.10) 100%);
    }
    .nav-level-badge {
      margin-left: auto;
      font-size: 10px;
      padding: 2px 6px;
      background: #1ab394;
      color: #fff;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .nav-level-badge.sub {
      background: rgba(255,255,255,0.12);
      color: #cbd5e1;
      margin-left: auto;
      margin-right: 6px;
    }
    .nav-level-badge.sub3 {
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-size: 9px;
      margin-left: auto;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .nav-item-sub {
      padding-left: 55px !important;
      font-size: 12.5px;
    }
    .nav-group-header .nav-level-badge.sub {
      margin-left: 0;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .nav-item.active {
      background: #1ab394;
      color: white;
      border-left-color: #fff;
    }
    
    .nav-item .nav-icon {
      margin-right: 8px;
      font-size: 14px;
    }
    
    .nav-item .nav-label {
      flex: 1;
    }
    
    .nav-item .nav-badge {
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
    }
    
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f3f3f4;
      overflow: hidden;
    }
    
    .main-header {
      height: 50px;
      background: white;
      border-bottom: 1px solid #e7eaec;
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    
    .main-header .title {
      font-size: 16px;
      font-weight: bold;
      color: #676a6c;
    }
    
    .iframe-container {
      flex: 1;
      overflow: hidden;
      background: white;
    }
    
    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .nav-group-header .nav-label { display: none; }
      .nav-item .nav-label { display: none; }
      .nav-item { padding-left: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">实验管理系统</div>
      <div class="nav-menu" id="navMenu"></div>
    </div>
    <div class="main-content">
      <div class="main-header">
        <span class="title" id="pageTitle">实验概览</span>
      </div>
      <div class="iframe-container">
        <iframe id="pageFrame" src="00-Experiment_overview.html"></iframe>
      </div>
    </div>
  </div>

  <script>
    const navGroups = [
      {
        id: 'overview',
        name: '实验概览',
        file: '00-Experiment_overview.html',
        icon: '📊',
        level: 'top',
        standalone: true
      },
      {
        id: 'experiment',
        name: '实验管理',
        icon: '🧪',
        expanded: true,
        level: 'sub',
        children: [
          { id: '01', name: '新增实验', file: '01-Add_New.html', icon: '➕' },
          { id: '02', name: '实验分组', file: '02-Grouping.html', icon: '📝' },
          { id: '03', name: '日常记录1', file: '03-DailyRecords.html', icon: '📅' },
          { id: '04', name: '阶段结束1', file: '04-StageDone.html', icon: '🔚' },
          { id: '05', name: '阶段确认1', file: '05-StageConfirm.html', icon: '✅' },
          { id: '06', name: '日常记录2', file: '06-DailyRecord2.html', icon: '📅' },
          { id: '07', name: '阶段结束2', file: '07-StageDone2.html', icon: '🔚' },
          { id: '08', name: '阶段确认2', file: '08-StageConfirm2.html', icon: '✅' },
          { id: '09', name: '实验结束', file: '09-ExperimentEnd.html', icon: '🏁' }
        ]
      },
      {
        id: 'analysis',
        name: '数据分析',
        icon: '📈',
        expanded: false,
        level: 'sub',
        children: [
          { id: '10', name: '数据分析', file: '10-AnalysisReport.html', icon: '📊' }
        ]
      }
    ]

    const navMenu = document.getElementById('navMenu')
    const pageFrame = document.getElementById('pageFrame')
    const pageTitle = document.getElementById('pageTitle')

    navGroups.forEach(group => {
      const groupDiv = document.createElement('div')
      groupDiv.className = 'nav-group'

      // 顶级独立项（实验概览）
      if (group.standalone) {
        const topItem = document.createElement('div')
        topItem.className = 'nav-item nav-item-top active'
        topItem.innerHTML = `
          <span class="nav-icon">${group.icon}</span>
          <span class="nav-label">${group.name}</span>
          <span class="nav-level-badge">L1</span>
        `
        topItem.addEventListener('click', () => {
          document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'))
          topItem.classList.add('active')
          pageFrame.src = group.file
          pageTitle.textContent = group.name
        })
        groupDiv.appendChild(topItem)
        navMenu.appendChild(groupDiv)
        return
      }

      const header = document.createElement('div')
      header.className = 'nav-group-header' + (group.expanded ? ' active' : '')
      header.innerHTML = `
        <span class="nav-icon">${group.icon}</span>
        <span class="nav-label">${group.name}</span>
        <span class="nav-level-badge sub">L2</span>
        <span class="nav-arrow">▶</span>
      `
      header.addEventListener('click', () => {
        header.classList.toggle('active')
        content.classList.toggle('expanded')
      })

      const content = document.createElement('div')
      content.className = 'nav-group-content' + (group.expanded ? ' expanded' : '')

      group.children.forEach(item => {
        const navItem = document.createElement('div')
        navItem.className = 'nav-item nav-item-sub'
        navItem.innerHTML = `
          <span class="nav-icon">${item.icon}</span>
          <span class="nav-label">${item.name}</span>
          <span class="nav-level-badge sub3">L3</span>
        `
        navItem.addEventListener('click', () => {
          document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'))
          navItem.classList.add('active')
          pageFrame.src = item.file
          pageTitle.textContent = item.name
        })
        content.appendChild(navItem)
      })

      groupDiv.appendChild(header)
      groupDiv.appendChild(content)
      navMenu.appendChild(groupDiv)
    })

    pageFrame.addEventListener('load', () => {
      try {
        const frameTitle = pageFrame.contentDocument.title
        if (frameTitle && frameTitle !== '实验管理系统') {
          pageTitle.textContent = frameTitle
        }
      } catch (e) {}
    })
  </script>
  <script src="password-protect.js"></script>
</body>
</html>
